# Copy to config.yaml (gitignored) and adjust.
# Any key can be overridden via environment: DELTA__SECTION__KEY
# e.g. DELTA__LOG__LEVEL=debug, DELTA__POSTGRES__DSN=...
# Secrets never go in this file. Point api_key_file/api_secret_file at
# files under the gitignored secrets/ directory (one secret per file,
# multiline PEM keys work), or inject values via environment:
#   DELTA__VENUES__BYBIT__API_KEY / DELTA__VENUES__BYBIT__API_SECRET

log:
  level: info # trace|debug|info|warn|error
  format: console # console|json

http:
  addr: ":8080" # /metrics /healthz /readyz

# Control-plane RPC server (ConnectRPC). Omit addr to disable.
# A unix:// socket is restricted to the owning user; use host:port only
# on trusted networks (no auth yet).
# api:
#   addr: "unix:///tmp/control.sock" # or "127.0.0.1:8081"

# Native services listen on the standard ports; the compose stack maps
# 5433/9010 so both can coexist. `make run-docker` overrides via env.
postgres:
  dsn: "postgres://trading:trading@localhost:5432/trading?sslmode=disable"

questdb:
  conf: "http::addr=localhost:9000;"

snapshot:
  interval: 60s

venues:
  bybit:
    enabled: true
    accounts: [spot]
    api_key_file: secrets/bybit_key
    api_secret_file: secrets/bybit_secret
    rate:
      rps: 5
      burst: 10
