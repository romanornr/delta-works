# Copy to config.yaml (gitignored) and adjust.
# Any key can be overridden via environment: DELTA__SECTION__KEY
# e.g. DELTA__LOG__LEVEL=debug, DELTA__POSTGRES__DSN=...
# Secrets (venue API keys) are env-only, never in this file:
#   DELTA__VENUES__BYBIT__API_KEY / DELTA__VENUES__BYBIT__API_SECRET

log:
  level: info # trace|debug|info|warn|error
  format: console # console|json

http:
  addr: ":8080" # /metrics /healthz /readyz

postgres:
  dsn: "postgres://delta:delta@localhost:5433/delta?sslmode=disable"

questdb:
  conf: "http::addr=localhost:9010;"

snapshot:
  interval: 60s

venues:
  bybit:
    enabled: true
    accounts: [spot]
    rate:
      rps: 5
      burst: 10
