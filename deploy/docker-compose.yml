name: delta-works

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: delta
      POSTGRES_PASSWORD: delta
      POSTGRES_DB: delta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delta -d delta"]
      interval: 5s
      timeout: 3s
      retries: 10

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000" # HTTP console + ILP over HTTP
      - "8812:8812" # PGWire (reads)
    volumes:
      - questdb:/var/lib/questdb

  prometheus:
    image: prom/prometheus:latest
    profiles: [observability]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana:/var/lib/grafana

volumes:
  pgdata:
  questdb:
  grafana:
