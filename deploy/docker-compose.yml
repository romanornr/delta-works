name: delta-works

# Host ports are offset (+1 or similar) so the stack coexists with natively
# installed Postgres (5432), QuestDB (9000/8812), Prometheus (9090) and
# Grafana (3000). config.example.yaml targets the native ports; `make
# run-docker` and `make migrate-* ` reach this stack via env overrides.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      # Brand-neutral on purpose: the database identity survives a project
      # rename (AGENTS.md).
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10

  questdb:
    image: questdb/questdb:latest
    ports:
      - "9010:9000" # HTTP console + ILP over HTTP
      - "8813:8812" # PGWire (reads)
    volumes:
      - questdb:/var/lib/questdb

  prometheus:
    image: prom/prometheus:latest
    profiles: [observability]
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    profiles: [observability]
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana:/var/lib/grafana

volumes:
  pgdata:
  questdb:
  grafana:
